<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pointSignal {
        0%, 100% { opacity: .48; transform: translateY(0) scale(.86); }
        36% { opacity: .94; transform: translateY(-7px) scale(1.16); }
        62% { opacity: .78; transform: translateY(3px) scale(.98); }
      }
      @keyframes terminalContour {
        to { stroke-dashoffset: -255; }
      }
      @keyframes clusterSwapTop {
        0%, 18%, 100% { transform: rotate(0deg); }
        42%, 58% { transform: rotate(88deg); }
        82% { transform: rotate(180deg); }
      }
      @keyframes clusterSwapBottom {
        0%, 16%, 100% { transform: rotate(0deg); }
        44%, 60% { transform: rotate(-88deg); }
        84% { transform: rotate(-180deg); }
      }
      @keyframes tipWhisper {
        0%, 100% { opacity: .16; stroke-dashoffset: 34; }
        44% { opacity: .44; }
        72% { opacity: .28; stroke-dashoffset: -30; }
      }
      @keyframes wordLight {
        0%, 100% { opacity: .04; transform: translateX(-220px); }
        44%, 56% { opacity: .22; }
        100% { transform: translateX(220px); }
      }
      .signal {
        transform-box: fill-box;
        transform-origin: center;
      }
      .signal-top { animation: clusterSwapTop 6.2s cubic-bezier(.35,0,.15,1) infinite; }
      .signal-bottom { animation: clusterSwapBottom 6.2s cubic-bezier(.35,0,.15,1) infinite; animation-delay: -.55s; }
      .signal rect {
        animation: pointSignal 3.2s cubic-bezier(.2,.7,.2,1) infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      .signal rect:nth-child(2) { animation-delay: .18s; }
      .signal rect:nth-child(3) { animation-delay: .36s; }
      .signal rect:nth-child(4) { animation-delay: .54s; }
      .signal rect:nth-child(5) { animation-delay: .72s; }
      .signal rect:nth-child(6) { animation-delay: .9s; }
      .tip-lines line {
        stroke-dasharray: 18 16;
        animation: tipWhisper 4.6s ease-in-out infinite;
      }
      .tip-lines line:nth-child(2) { animation-delay: .32s; }
      .tip-lines line:nth-child(3) { animation-delay: .64s; }
      .tip-lines line:nth-child(4) { animation-delay: .96s; }
      .terminal-contour {
        stroke-dasharray: 14 37;
        animation: terminalContour 22s linear infinite;
      }
      .brand-scan {
        animation: wordLight 5.8s ease-in-out infinite;
        animation-delay: -2s;
        transform-origin: center;
      }
    </style>
    <radialGradient id="aeBg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 150) rotate(90) scale(760 940)">
      <stop stop-color="#4338CA" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#4338CA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aeTop" x1="520" y1="250" x2="1024" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F7FB"/>
      <stop offset="0.48" stop-color="#5F7EF3"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="aeBottom" x1="1008" y1="466" x2="480" y2="708" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5F7EF3"/>
      <stop offset="0.48" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#F5F7FB"/>
    </linearGradient>
    <linearGradient id="aeWarm" x1="575" y1="315" x2="980" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2BA" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#FFE8A8" stop-opacity=".28"/>
      <stop offset="0.5" stop-color="#FFF8D6" stop-opacity=".4"/>
      <stop offset="0.68" stop-color="#FFE4A0" stop-opacity=".2"/>
      <stop offset="1" stop-color="#FFF2BA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aeRule" x1="824" y1="866" x2="1212" y2="866" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E152A" stop-opacity="0"/>
      <stop offset="0.14" stop-color="#233052" stop-opacity=".22"/>
      <stop offset="0.5" stop-color="#CDD5E2" stop-opacity=".48"/>
      <stop offset="0.86" stop-color="#233052" stop-opacity=".22"/>
      <stop offset="1" stop-color="#0E152A" stop-opacity="0"/>
    </linearGradient>
    <filter id="aeGlow" x="350" y="150" width="900" height="650" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#5F7EF3" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="aeGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="white" stroke-opacity="0.038" stroke-width="1"/>
    </pattern>
  </defs>

  <g>
    <path d="M972 284 C842 258 675 274 606 344 C551 400 579 464 672 504 C770 546 842 577 824 634 C802 705 640 700 520 676" stroke="url(#aeTop)" stroke-width="68" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M662 394 C790 414 957 450 990 552 C1016 634 930 705 792 728 C668 748 558 724 488 700" stroke="url(#aeBottom)" stroke-width="68" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g>
    <g transform="rotate(45 996 284)">
      <rect x="970" y="258" width="52" height="52" rx="16" fill="#0A0F1F" fill-opacity=".56" stroke="#CDD5E2" stroke-opacity=".24" stroke-width="1.4"/>
      <rect x="986" y="274" width="20" height="20" rx="6" fill="#F5F7FB" fill-opacity=".82"/>
    </g>
    <rect class="terminal-contour" x="964" y="252" width="64" height="64" rx="20" transform="rotate(45 996 284)" fill="none" stroke="#FFE8A8" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round" opacity=".2"/>
  </g>

  <g class="tip-lines" stroke-linecap="round">
    <g stroke="#CDD5E2" stroke-width="1.35" opacity=".34">
      <line x1="451" y1="681" x2="424" y2="681"/>
      <line x1="446" y1="694" x2="412" y2="694"/>
      <line x1="450" y1="707" x2="420" y2="707"/>
      <line x1="459" y1="718" x2="434" y2="718"/>
    </g>
  </g>

  <g class="signal signal-top" fill="#5F7EF3">
    <rect x="480" y="258" width="18" height="18" rx="3"/>
    <rect x="520" y="284" width="16" height="16" rx="3"/>
    <rect x="552" y="250" width="18" height="18" rx="3"/>
    <rect x="516" y="328" width="26" height="26" rx="4"/>
    <rect x="468" y="304" width="12" height="12" rx="2"/>
    <rect x="552" y="304" width="13" height="13" rx="2"/>
  </g>
  <g class="signal signal-bottom" fill="#4338CA">
    <rect x="980" y="656" width="22" height="22" rx="4"/>
    <rect x="1026" y="696" width="16" height="16" rx="3"/>
    <rect x="936" y="722" width="18" height="18" rx="3"/>
    <rect x="1010" y="734" width="13" height="13" rx="2"/>
  </g>

  <g text-anchor="middle">
    <text x="800" y="836" fill="#FFFFFF" font-family="Sora, Montserrat, Arial, sans-serif" font-size="134" font-weight="800" letter-spacing="-1.5">Sooplix</text>
    <text x="1134" y="836" fill="#5F7EF3" font-family="Sora, Montserrat, Arial, sans-serif" font-size="72" font-weight="500">web</text>
    <line x1="824" y1="866" x2="1212" y2="866" stroke="url(#aeRule)" stroke-width="2.1" stroke-linecap="round"/>
    <line x1="872" y1="866" x2="1164" y2="866" stroke="#CDD5E2" stroke-opacity=".16" stroke-width=".7" stroke-linecap="round"/>
    <text x="1018" y="895" fill="#AEB8CE" font-family="'Bahnschrift Light', Bahnschrift, 'Segoe UI', Arial, sans-serif" font-size="17.2" font-weight="300" letter-spacing="5" textLength="388" lengthAdjust="spacingAndGlyphs">SOLU&#199;&#213;ES DIGITAIS</text>
    <rect class="brand-scan" x="842" y="865.2" width="116" height="1.2" rx=".6" fill="#FFE8A8" opacity=".16"/>
  </g>
</svg>
